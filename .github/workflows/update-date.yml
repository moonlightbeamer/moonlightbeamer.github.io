name: Update last-updated date

on:
  push:
    branches: [main]

jobs:
  update-date:
    runs-on: ubuntu-latest
    # Don't run on the bot's own commit (prevents infinite loop)
    if: github.actor != 'github-actions[bot]'
    steps:
      - uses: actions/checkout@v4

      - name: Update date in index.html
        run: |
          DATE=$(date '+%B %-d, %Y')
          sed -i "s/Last updated: [^<]*/Last updated: $DATE/" index.html

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet && echo "No date change needed" || \
            git commit -m "chore: update last-updated date [skip ci]" && git push
